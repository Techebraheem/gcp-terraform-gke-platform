{{- if .Values.networkPolicy.enabled }}
# Default-deny + explicit allow, enforced by Dataplane V2 (set in the GKE
# terraform module). Without this, every pod in the namespace can talk to
# every other pod by default — this closes that gap the same way the VPC
# module's deny-all-ingress firewall closes it at the network layer.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flask-app-default-deny
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flask-app-allow
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: flask-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {} # allow traffic only from within the cluster
      ports:
        - port: 8080
  egress:
    - to: [] # allow egress to Google APIs (Secret Manager, Logging) via Private Google Access
      ports:
        - port: 443
    - ports:
        - port: 53 # DNS
          protocol: UDP
{{- end }}

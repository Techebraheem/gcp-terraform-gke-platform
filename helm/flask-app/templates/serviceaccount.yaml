# This is the Kubernetes-side half of Workload Identity. The GCP-side half
# (the google_service_account_iam_member "workloadIdentityUser" binding) lives
# in terraform/modules/iam/main.tf. Both halves must reference each other
# exactly, or pods silently fall back to no credentials.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccountEmail }}
